name: Shortcut Sync

on:
  schedule:
    # Tier 1 apps: every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
    # Tier 2 apps: 1st and 15th of each month at 07:00 UTC
    - cron: '0 7 1,15 * *'
  workflow_dispatch:
    inputs:
      app_slug:
        description: 'App slug to check (blank = all scheduled)'
        required: false
      platform:
        description: 'Platform to check (blank = all)'
        required: false
      tier:
        description: 'Tier to check (1, 2, or 3)'
        required: false
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Determine sync args
        id: args
        env:
          INPUT_APP: ${{ inputs.app_slug }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_TIER: ${{ inputs.tier }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          ARGS=""
          if [ "$EVENT_NAME" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "06" ]; then
              ARGS="--tier=1"
            else
              ARGS="--tier=2"
            fi
          else
            if [ -n "$INPUT_APP" ]; then
              ARGS="--app=$INPUT_APP"
            fi
            if [ -n "$INPUT_PLATFORM" ]; then
              ARGS="$ARGS --platform=$INPUT_PLATFORM"
            fi
            if [ -n "$INPUT_TIER" ]; then
              ARGS="$ARGS --tier=$INPUT_TIER"
            fi
            if [ "$INPUT_DRY_RUN" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run shortcut sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_ARGS: ${{ steps.args.outputs.args }}
        run: node scripts/shortcut-sync/run.mjs $SYNC_ARGS
