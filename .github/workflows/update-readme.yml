name: Update README app directory

on:
  # Run weekly on Monday at 6:00 UTC
  schedule:
    - cron: '0 6 * * 1'
  # Run after successful deploy
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run if triggered manually, by schedule, or after a successful CI/CD run
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Update README app directory
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/update-readme-apps.mjs

      - name: Commit and push if changed
        env:
          COMMIT_MSG: "docs: update README app directory"
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "$COMMIT_MSG"
          git push
